name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # rust-toolchain.toml pins a specific toolchain, which rustup
      # auto-installs WITHOUT the cross target — add it to the pinned
      # toolchain explicitly or musl builds die with E0463 (no `core`).
      - name: Add target to pinned toolchain
        run: rustup target add ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p rocinante-cli
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf rocinante-${{ matrix.target }}.tar.gz rocinante
          mv rocinante-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/rocinante.exe -DestinationPath rocinante-${{ matrix.target }}.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: rocinante-*.${{ matrix.archive }}
          generate_release_notes: true

  # One SHA256SUMS covering every archive, plus the installer scripts, so
  # `curl | sh` can verify downloads against the same release.
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --pattern 'rocinante-*'
      - name: Generate SHA256SUMS
        run: sha256sum rocinante-* > SHA256SUMS
      - name: Upload checksums and installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SHA256SUMS
            install.sh
            install.ps1

  # The installers must work against the release they just shipped with.
  install-test:
    needs: checksums
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run: ROCINANTE_VERSION="$GITHUB_REF_NAME" sh install.sh && "$HOME/.local/bin/rocinante" --version
          - os: macos-latest
            run: ROCINANTE_VERSION="$GITHUB_REF_NAME" sh install.sh && "$HOME/.local/bin/rocinante" --version
          - os: windows-latest
            run: $env:ROCINANTE_VERSION = $env:GITHUB_REF_NAME; ./install.ps1; & "$env:LOCALAPPDATA\Rocinante\bin\rocinante.exe" --version
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run installer against this release
        run: ${{ matrix.run }}
